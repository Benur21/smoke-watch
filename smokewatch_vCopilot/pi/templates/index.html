<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmokeWatch - Histórico</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #101018;
      color: #f0f0f0;
    }
    header {
      padding: 20px;
      background: #181828;
      border-bottom: 1px solid #2d2d3d;
    }
    h1 {
      margin: 0;
      font-size: 1.4rem;
    }
    .status {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #bcc4d6;
    }
    #plot {
      width: 100%;
      height: calc(100vh - 120px);
    }
  </style>
</head>
<body>
  <header>
    <h1>SmokeWatch</h1>
    <div class="status" id="status">A carregar dados...</div>
  </header>
  <div id="plot"></div>

  <script>
    // ====================
    // Configuráveis
    // ====================
    const MAX_POINTS_DEFAULT = 1000;
    const REFRESH_INTERVAL_MS = 300000; // 5 minutos

    // ====================
    // Estado Global
    // ====================
    const statusEl = document.getElementById('status');
    const plotEl = document.getElementById('plot');
    let lastRequestedInterval = null;
    let allData = null;

    // ====================
    // Funções Auxiliares
    // ====================
    function buildSeries(records) {
      const xBlue = [];
      const yBlue = [];
      const textBlue = [];
      const xRed = [];
      const yRed = [];
      const textRed = [];

      for (let i = 0; i < records.timestamps.length; i += 1) {
        const ts = records.timestamps[i];
        const ao = records.ao_values[i];
        const doValue = records.do_values[i];
        const text = `AO=${ao} DO=${doValue}`;

        if (doValue === 0) {
          xBlue.push(ts);
          yBlue.push(ao);
          textBlue.push(text);
          xRed.push(null);
          yRed.push(null);
          textRed.push('');
        } else {
          xRed.push(ts);
          yRed.push(ao);
          textRed.push(text);
          xBlue.push(null);
          yBlue.push(null);
          textBlue.push('');
        }
      }

      return [
        {
          x: xBlue,
          y: yBlue,
          text: textBlue,
          mode: 'lines+markers',
          name: 'DO = 0',
          line: { color: '#2f8ef7', width: 2 },
          marker: { size: 4, color: '#2f8ef7' },
          connectgaps: false,
          hoverinfo: 'x+y+text',
        },
        {
          x: xRed,
          y: yRed,
          text: textRed,
          mode: 'lines+markers',
          name: 'DO = 1',
          line: { color: '#f74c4c', width: 2 },
          marker: { size: 4, color: '#f74c4c' },
          connectgaps: false,
          hoverinfo: 'x+y+text',
        },
      ];
    }

    function formatInterval(start, end) {
      if (!start || !end) {
        return 'all';
      }
      return `${Math.round(start)}_${Math.round(end)}`;
    }

    function getVisibleInterval() {
      const layout = plotEl._fullLayout;
      if (!layout || !layout.xaxis) {
        return null;
      }
      const xaxis = layout.xaxis;
      if (!xaxis.range) {
        return null;
      }
      const start = new Date(xaxis.range[0]).getTime();
      const end = new Date(xaxis.range[1]).getTime();
      return { start, end };
    }

    // ====================
    // Refresh de Dados
    // ====================
    async function refreshData() {
      statusEl.textContent = 'A actualizar...';
      try {
        const interval = getVisibleInterval();
        let url = `/data?max_points=${MAX_POINTS_DEFAULT}`;

        if (interval) {
          url += `&start=${interval.start}&end=${interval.end}`;
        }

        const intervalKey = formatInterval(interval?.start, interval?.end);
        
        // Evitar pedidos duplicados
        if (lastRequestedInterval === intervalKey && allData) {
          statusEl.textContent = `Registos: ${allData.record_count} | Tamanho do ficheiro: ${allData.file_size} bytes | Atualizado: ${allData.updated_at}`;
          return;
        }

        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        allData = payload;
        lastRequestedInterval = intervalKey;

        statusEl.textContent = `Registos: ${payload.record_count} (${payload.returned_points} mostrados) | Tamanho do ficheiro: ${payload.file_size} bytes | Atualizado: ${payload.updated_at}`;

        const series = buildSeries(payload);
        if (plotEl.data && plotEl.data.length > 0) {
          // Update existing plot with restyle (mantém zoom/pan)
          Plotly.restyle(plotEl, { x: [series[0].x, series[1].x], y: [series[0].y, series[1].y], text: [series[0].text, series[1].text] });
        } else {
          // First load: create new plot
          const layout = {
            paper_bgcolor: '#101018',
            plot_bgcolor: '#13131f',
            font: { color: '#f0f0f0' },
            xaxis: { title: 'Timestamp', type: 'date' },
            yaxis: { title: 'AO value', range: [0, 1023] },
            legend: { orientation: 'h', yanchor: 'bottom', y: 1.02, xanchor: 'right', x: 1 },
          };
          Plotly.newPlot(plotEl, series, layout, { responsive: true });
        }
      } catch (error) {
        statusEl.textContent = `Erro ao carregar dados: ${error.message}`;
      }
    }

    // ====================
    // Inicialização
    // ====================
    refreshData();
    setInterval(refreshData, REFRESH_INTERVAL_MS);

    // Listen for zoom/pan events (attach via both DOM and Plotly APIs)
    function _scheduleRefreshOnRelayout(eventdata) {
      if (plotEl._relayoutTimeout) clearTimeout(plotEl._relayoutTimeout);
      plotEl._relayoutTimeout = setTimeout(() => { refreshData(); }, 150);
    }

    if (plotEl.addEventListener) {
      plotEl.addEventListener('plotly_relayout', _scheduleRefreshOnRelayout);
    }
    if (typeof Plotly !== 'undefined' && typeof plotEl.on === 'function') {
      plotEl.on('plotly_relayout', _scheduleRefreshOnRelayout);
    }
  </script>
</body>
</html>
