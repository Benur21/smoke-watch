<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmokeWatch - Histórico</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #101018;
      color: #f0f0f0;
    }
    header {
      padding: 20px;
      background: #181828;
      border-bottom: 1px solid #2d2d3d;
    }
    h1 {
      margin: 0;
      font-size: 1.4rem;
    }
    .status {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #bcc4d6;
    }
    #plot {
      width: 100%;
      height: calc(100vh - 120px);
    }
  </style>
</head>
<body>
  <header>
    <h1>SmokeWatch</h1>
    <div class="status" id="status">A carregar dados...</div>
  </header>
  <div id="plot"></div>

  <script>
    // ====================
    // Configuráveis
    // ====================
    const MAX_POINTS_DEFAULT = 1000;
    const REFRESH_INTERVAL_MS = 300000; // 5 minutos

    // ====================
    // Estado Global
    // ====================
    const statusEl = document.getElementById('status');
    const plotEl = document.getElementById('plot');
    let activeInterval = null;
    let allData = null;
    let plotEventsAttached = false;
    let isRefreshing = false;

    // ====================
    // Funções Auxiliares
    // ====================
    function buildSeries(records) {
      const xBlue = [];
      const yBlue = [];
      const textBlue = [];
      const xRed = [];
      const yRed = [];
      const textRed = [];

      for (let i = 0; i < records.timestamps.length; i += 1) {
        const ts = records.timestamps[i];
        const ao = records.ao_values[i];
        const doValue = records.do_values[i];
        const text = `AO=${ao} DO=${doValue}`;

        if (doValue === 0) {
          xBlue.push(ts);
          yBlue.push(ao);
          textBlue.push(text);
          xRed.push(null);
          yRed.push(null);
          textRed.push('');
        } else {
          xRed.push(ts);
          yRed.push(ao);
          textRed.push(text);
          xBlue.push(null);
          yBlue.push(null);
          textBlue.push('');
        }
      }

      return [
        {
          x: xBlue,
          y: yBlue,
          text: textBlue,
          mode: 'lines+markers',
          name: 'DO = 0',
          line: { color: '#f74c4c', width: 2 },
          marker: { size: 4, color: '#f74c4c' },
          connectgaps: false,
          hoverinfo: 'x+y+text',
        },
        {
          x: xRed,
          y: yRed,
          text: textRed,
          mode: 'lines+markers',
          name: 'DO = 1',
          line: { color: '#2f8ef7', width: 2 },
          marker: { size: 4, color: '#2f8ef7' },
          connectgaps: false,
          hoverinfo: 'x+y+text',
        },
      ];
    }

    function normalizeInterval(start, end) {
      if (!Number.isFinite(start) || !Number.isFinite(end)) {
        return null;
      }
      if (start > end) {
        return { start: end, end: start };
      }
      return { start, end };
    }

    function formatInterval(interval) {
      if (!interval) {
        return 'all';
      }
      return `${Math.round(interval.start)}_${Math.round(interval.end)}`;
    }

    function getVisibleInterval() {
      const layout = plotEl._fullLayout;
      if (!layout || !layout.xaxis) {
        return null;
      }
      const xaxis = layout.xaxis;
      if (!xaxis.range) {
        return null;
      }
      const start = new Date(xaxis.range[0]).getTime();
      const end = new Date(xaxis.range[1]).getTime();
      return normalizeInterval(start, end);
    }

    function getIntervalFromRelayout(eventdata) {
      if (!eventdata) {
        return getVisibleInterval();
      }
      if (eventdata['xaxis.autorange']) {
        return null;
      }
      if (Array.isArray(eventdata['xaxis.range'])) {
        return normalizeInterval(
          new Date(eventdata['xaxis.range'][0]).getTime(),
          new Date(eventdata['xaxis.range'][1]).getTime(),
        );
      }
      if (eventdata['xaxis.range[0]'] !== undefined && eventdata['xaxis.range[1]'] !== undefined) {
        return normalizeInterval(
          new Date(eventdata['xaxis.range[0]']).getTime(),
          new Date(eventdata['xaxis.range[1]']).getTime(),
        );
      }
      return getVisibleInterval();
    }

    function relayoutTouchesXaxis(eventdata) {
      if (!eventdata) {
        return true;
      }
      return Object.keys(eventdata).some((key) => (
        key === 'xaxis.autorange' ||
        key === 'xaxis.range' ||
        key.startsWith('xaxis.range[')
      ));
    }

    function attachPlotEvents() {
      if (plotEventsAttached || typeof plotEl.on !== 'function') {
        return;
      }
      plotEl.on('plotly_relayout', _scheduleRefreshOnRelayout);
      plotEventsAttached = true;
    }

    function getCurrentYAxisRange() {
      const layout = plotEl._fullLayout;
      if (!layout || !layout.yaxis || !Array.isArray(layout.yaxis.range)) {
        return null;
      }
      return layout.yaxis.range;
    }

    function buildLayout(interval, yRange) {
      const layout = {
        paper_bgcolor: '#101018',
        plot_bgcolor: '#13131f',
        font: { color: '#f0f0f0' },
        xaxis: { title: 'Timestamp', type: 'date' },
        yaxis: { title: 'AO value' },
        legend: { orientation: 'h', yanchor: 'bottom', y: 1.02, xanchor: 'right', x: 1 },
      };

      if (Array.isArray(yRange) && yRange.length === 2) {
        layout.yaxis.range = yRange;
      } else {
        layout.yaxis.range = [0, 1023];
      }

      if (interval) {
        layout.xaxis.range = [new Date(interval.start), new Date(interval.end)];
      } else {
        layout.xaxis.autorange = true;
      }

      return layout;
    }

    // ====================
    // Refresh de Dados
    // ====================
    async function refreshData(interval) {
      const requestedInterval = arguments.length > 0 ? interval : activeInterval;
      activeInterval = requestedInterval;
      const preservedYRange = getCurrentYAxisRange();
      isRefreshing = true;
      statusEl.textContent = 'A actualizar...';
      try {
        let url = `/data?max_points=${MAX_POINTS_DEFAULT}`;

        if (requestedInterval) {
          url += `&start=${Math.round(requestedInterval.start)}&end=${Math.round(requestedInterval.end)}`;
        }

        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        allData = payload;

        statusEl.textContent = `Registos: ${payload.record_count} (${payload.returned_points} mostrados) | Tamanho do ficheiro: ${payload.file_size} bytes | Atualizado: ${payload.updated_at}`;

        const series = buildSeries(payload);
        const layout = buildLayout(requestedInterval, preservedYRange);
        await Plotly.react(plotEl, series, layout, { responsive: true });
        attachPlotEvents();
      } catch (error) {
        statusEl.textContent = `Erro ao carregar dados: ${error.message}`;
      } finally {
        isRefreshing = false;
      }
    }

    // ====================
    // Inicialização
    // ====================
    refreshData();
    setInterval(refreshData, REFRESH_INTERVAL_MS);

    // Listen for zoom/pan events after Plotly initializes the graph div.
    function _scheduleRefreshOnRelayout(eventdata) {
      if (isRefreshing) {
        return;
      }
      if (!relayoutTouchesXaxis(eventdata)) {
        return;
      }
      const nextInterval = getIntervalFromRelayout(eventdata);
      if (formatInterval(nextInterval) === formatInterval(activeInterval)) {
        return;
      }
      activeInterval = nextInterval;
      if (plotEl._relayoutTimeout) clearTimeout(plotEl._relayoutTimeout);
      plotEl._relayoutTimeout = setTimeout(() => { refreshData(nextInterval); }, 150);
    }
  </script>
</body>
</html>
