<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmokeWatch - Histórico</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #101018;
      color: #f0f0f0;
    }
    header {
      padding: 20px;
      background: #181828;
      border-bottom: 1px solid #2d2d3d;
    }
    h1 {
      margin: 0;
      font-size: 1.4rem;
    }
    .status {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #bcc4d6;
    }
    #plot {
      width: 100%;
      height: calc(100vh - 120px);
    }
  </style>
</head>
<body>
  <header>
    <h1>SmokeWatch</h1>
    <div class="status" id="status">A carregar dados...</div>
  </header>
  <div id="plot"></div>

  <script>
    const refreshIntervalMs = 300000;
    const statusEl = document.getElementById('status');
    const plotEl = document.getElementById('plot');
    let lastFileSize = 0;

    function buildSeries(records) {
      const xBlue = [];
      const yBlue = [];
      const textBlue = [];
      const xRed = [];
      const yRed = [];
      const textRed = [];

      for (let i = 0; i < records.timestamps.length; i += 1) {
        const ts = records.timestamps[i];
        const ao = records.ao_values[i];
        const doValue = records.do_values[i];
        const text = `AO=${ao} DO=${doValue}`;

        if (doValue === 0) {
          xBlue.push(ts);
          yBlue.push(ao);
          textBlue.push(text);
          xRed.push(null);
          yRed.push(null);
          textRed.push('');
        } else {
          xRed.push(ts);
          yRed.push(ao);
          textRed.push(text);
          xBlue.push(null);
          yBlue.push(null);
          textBlue.push('');
        }
      }

      return [
        {
          x: xBlue,
          y: yBlue,
          text: textBlue,
          mode: 'lines+markers',
          name: 'DO = 0',
          line: { color: '#2f8ef7', width: 2 },
          marker: { size: 4, color: '#2f8ef7' },
          connectgaps: false,
          hoverinfo: 'x+y+text',
        },
        {
          x: xRed,
          y: yRed,
          text: textRed,
          mode: 'lines+markers',
          name: 'DO = 1',
          line: { color: '#f74c4c', width: 2 },
          marker: { size: 4, color: '#f74c4c' },
          connectgaps: false,
          hoverinfo: 'x+y+text',
        },
      ];
    }

    async function refreshData() {
      statusEl.textContent = 'A actualizar...';
      try {
        const response = await fetch('/data');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        statusEl.textContent = `Registos: ${payload.record_count} | Tamanho do ficheiro: ${payload.file_size} bytes | Atualizado: ${payload.updated_at}`;

        if (payload.file_size === lastFileSize && payload.record_count > 0) {
          return;
        }

        lastFileSize = payload.file_size;
        const layout = {
          paper_bgcolor: '#101018',
          plot_bgcolor: '#13131f',
          font: { color: '#f0f0f0' },
          xaxis: { title: 'Timestamp', type: 'date' },
          yaxis: { title: 'AO value', range: [0, 1023] },
          legend: { orientation: 'h', yanchor: 'bottom', y: 1.02, xanchor: 'right', x: 1 },
        };

        const series = buildSeries(payload);
        Plotly.newPlot(plotEl, series, layout, { responsive: true });
      } catch (error) {
        statusEl.textContent = `Erro ao carregar dados: ${error.message}`;
      }
    }

    refreshData();
    setInterval(refreshData, refreshIntervalMs);
  </script>
</body>
</html>
